name: run

on:
  workflow_dispatch:
  push:
  schedule:
    # 每天 UTC 时间 04:10 和 16:10 运行（北京时间 12:10 和 00:10）
    - cron: '10 4,16 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    
    # 【必须保留】赋予自带的 GITHUB_TOKEN 代码写入权限，以便脚本自动推送
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v3
        
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping npm ci"
          fi

      - name: Run GLaDOS Checkin
        run: node main.js
        env:
          # 1. 基础签到与 PushPlus
          GLADOS: ${{ secrets.GLADOS }}
          NOTIFY: ${{ secrets.NOTIFY }}
          
          # 2. Server 酱
          SCTKEY: ${{ secrets.SCTKEY }}
          
          # 3. Matrix 强力提醒配置
          MATRIX_HS_URL: ${{ secrets.MATRIX_HS_URL }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
          MATRIX_TOKEN: ${{ secrets.MATRIX_TOKEN }}

      # 【进阶保活逻辑】纯原生命令：判断距离上次提交是否超过 50 天，超过才进行空提交
      - name: Keep GitHub Actions Alive conditionally
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 获取最后一次代码提交的时间戳
          LAST_COMMIT_TS=$(git log -1 --format="%ct")
          # 获取当前的系统时间戳
          NOW_TS=$(date +%s)
          # 计算时间差，并转换为天数 (86400 秒 = 1 天)
          DIFF_DAYS=$(((NOW_TS - LAST_COMMIT_TS) / 86400))
          
          echo "距离仓库上次提交已经过去了 $DIFF_DAYS 天"
          
          # 如果距离上次提交大于 50 天，才进行一次空提交来重置 60 天闲置倒计时
          if [ "$DIFF_DAYS" -gt 50 ]; then
            echo "超过 50 天，执行保活提交..."
            git commit --allow-empty -m "chore: keep alive GitHub Actions"
            git push
          else
            echo "未满 50 天，一切安全，跳过保活提交。"
          fi
