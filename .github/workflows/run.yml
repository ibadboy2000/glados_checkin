name: run

on:
  workflow_dispatch:
  push:
  schedule:
    # 每天 UTC 时间 04:10 和 16:10 运行（北京时间 12:10 和 00:10）
    - cron: '10 4,16 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    
    # 【新增1】必须赋予 GITHUB_TOKEN 代码写入权限，保活插件才能自动提交
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v3
        
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping npm ci"
          fi

      - name: Run GLaDOS Checkin
        run: node main.js
        env:
          # 1. 基础签到与 PushPlus
          GLADOS: ${{ secrets.GLADOS }}
          NOTIFY: ${{ secrets.NOTIFY }}
          
          # 2. Server 酱
          SCTKEY: ${{ secrets.SCTKEY }}
          
          # 3. Matrix 强力提醒配置
          MATRIX_HS_URL: ${{ secrets.MATRIX_HS_URL }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
          MATRIX_TOKEN: ${{ secrets.MATRIX_TOKEN }}

      # 【新增2】在所有任务完成后，调用保活插件
      - name: Keep GitHub Actions Alive
        uses: gautamkrishnar/keepalive-workflow@v2
